<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Card Collection Network</title>
    
    <!-- Preconnect to CDN for faster loading -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
      #insights-link {
        position: fixed;
        top: 14px;
        right: 16px;
        z-index: 9999;
        background: rgba(76,175,80,0.12);
        color: #4CAF50;
        border: 1px solid rgba(76,175,80,0.35);
        padding: 7px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.82em;
        font-weight: 600;
        font-family: 'Roboto', sans-serif;
        transition: background 0.2s, border-color 0.2s;
        backdrop-filter: blur(6px);
      }
      #insights-link:hover {
        background: rgba(76,175,80,0.22);
        border-color: rgba(76,175,80,0.6);
      }
    </style>
    
    <!-- PWA Manifest (optional - for "install app" feature) -->
    <!-- <link rel="manifest" href="manifest.json"> -->
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#1a2332">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- D3.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>
    <a href="pricing.html" id="insights-link" title="Further Insights — pricing &amp; analytics">📊 Further Insights</a>
    <div id="app"></div>
    
    <!-- Data file paths - MUST be defined before preload script -->
    <script>
        const DATA_URLS = {
            network: 'data/network_data.json',
            players: 'data/players.json',
            teams: 'data/teams.json',
            colors: 'data/team_colors.json'
        };
    </script>
    
    <!-- ⚡ PERFORMANCE OPTIMIZATION - Load first to start preloading data immediately -->
    <script src="js/preload-optimization.js"></script>
    <script src="js/canvas-optimizations.js"></script>
    
    <!-- Core application scripts - IMPORTANT ORDER -->
    <!-- export.js MUST load before network.js and app.js -->
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/network.js"></script>
    <script src="js/chord-standalone.js"></script>
    
    <!-- Feature enhancement scripts -->
    <script src="js/keyboard.js"></script>
    <script src="js/history.js"></script>
    <script src="js/url-state.js"></script>
    <script src="js/lod.js"></script>
    <script src="js/enhanced-search.js"></script>
    <script src="js/optimizations.js"></script>
</body>
</html>
