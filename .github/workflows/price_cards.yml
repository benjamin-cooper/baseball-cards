name: Price Cards

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'batch = N cards | full = all unpriced | player = target by name'
        required: false
        default: 'batch'
        type: choice
        options: [batch, full, player]
      batch_size:
        description: 'Cards per run (batch mode only)'
        required: false
        default: '200'
        type: string
      target_player:
        description: 'Player name or keyword to re-price (player mode only)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  price:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hrs — needed for full runs over large collections

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Run pricing agent ────────────────────────────────────────────────────
      - name: Run pricing agent
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          EBAY_APP_ID:            ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_SECRET:     ${{ secrets.EBAY_CLIENT_SECRET }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID:         ${{ secrets.SPREADSHEET_ID }}
          RUN_MODE:               ${{ github.event.inputs.run_mode }}
          BATCH_SIZE:             ${{ github.event.inputs.batch_size }}
          TARGET_PLAYER:         ${{ github.event.inputs.target_player }}
          OUTPUT_JSON:            data/pricing_results.json
        run: python scripts/price_cards.py

      # ── Commit results ───────────────────────────────────────────────────────
      - name: Commit pricing results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing_results.json data/price_history.json
          # Only commit if files actually changed
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update pricing results [${TIMESTAMP}]"
            git push
          fi
